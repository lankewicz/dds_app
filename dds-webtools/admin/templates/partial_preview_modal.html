<!-- 
============================================================
FILE: templates/partial_preview_modal.html
FUNCTION: Reusable Slide Simulator Modal for Dashboard and Explorer.
============================================================
-->

<div id="previewModal" class="modal-overlay" style="display:none;">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title-group">
            <h2 id="modalTitle">Preview</h2>
            <small id="modalFolderId" style="color: var(--muted); font-family: monospace;"></small>
        </div>
        <div class="modal-close" onclick="closePreview()">&times;</div>
      </div>
      
      <div class="simulator-controls">
        <span style="font-size: 0.85em; font-weight: 700; color: var(--muted); letter-spacing: 0.5px;">SIMULAR DISPOSITIVO:</span>
        <button class="btn btn-sim active" data-size="10" onclick="setPreviewSize(10, this)">10" Tablet</button>
        <button class="btn btn-sim" data-size="7" onclick="setPreviewSize(7, this)">7" Tablet</button>
        <button class="btn btn-sim" data-size="5" onclick="setPreviewSize(5, this)">5" Smartphone</button>
      </div>

      <div class="modal-body">
        <div id="loadingSlides" style="text-align:center; padding: 50px; display:none;">
            <div class="spinner"></div>
            <p style="color: var(--muted);">Carregando slides...</p>
        </div>
        
        <div id="simulatorFrame" class="simulator-frame size-10">
            <img id="currentSlide" src="" alt="Slide">
            <div class="slide-nav">
                <button class="nav-btn prev" onclick="prevSlide()">❮</button>
                <div class="slide-counter"><span id="idxCurrent">1</span> / <span id="idxTotal">1</span></div>
                <button class="nav-btn next" onclick="nextSlide()">❯</button>
            </div>
        </div>
      </div>
    </div>
</div>

<script>
    let currentSlides = [];
    let currentIndex = 0;

    async function openPreview(folderId, subject) {
        const modal = document.getElementById('previewModal');
        const img = document.getElementById('currentSlide');
        const loading = document.getElementById('loadingSlides');
        const frame = document.getElementById('simulatorFrame');

        document.getElementById('modalTitle').innerText = subject;
        document.getElementById('modalFolderId').innerText = folderId;
        
        modal.style.display = 'flex';
        loading.style.display = 'block';
        frame.style.display = 'none';
        img.src = "";

        try {
            const resp = await fetch(`/admin/explorer/slides?folderId=${encodeURIComponent(folderId)}`);
            const data = await resp.json();
            
            if (data.ok && data.slides.length > 0) {
                currentSlides = data.slides;
                currentIndex = 0;
                updateSlide();
                loading.style.display = 'none';
                frame.style.display = 'block';
            } else {
                alert('Nenhum slide encontrado nesta pasta.');
                closePreview();
            }
        } catch (e) {
            alert('Erro ao carregar slides: ' + e);
            closePreview();
        }
    }

    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
        currentSlides = [];
    }

    function updateSlide() {
        const img = document.getElementById('currentSlide');
        img.src = currentSlides[currentIndex].url;
        document.getElementById('idxCurrent').innerText = currentIndex + 1;
        document.getElementById('idxTotal').innerText = currentSlides.length;
    }

    function nextSlide() {
        if (currentIndex < currentSlides.length - 1) {
            currentIndex++;
            updateSlide();
        }
    }

    function prevSlide() {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlide();
        }
    }

    function setPreviewSize(size, btn) {
        const frame = document.getElementById('simulatorFrame');
        frame.classList.remove('size-10', 'size-7', 'size-5');
        frame.classList.add('size-' + size);
        document.querySelectorAll('.btn-sim').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
