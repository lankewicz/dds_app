<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gerando Relatório...</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .card { max-width: 880px; padding: 18px; border: 1px solid #ddd; border-radius: 10px; }
    .muted { color: #666; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    progress { width: 100%; height: 18px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .err { color: #b00020; font-weight: 700; }
    button { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Gerando relatório (1 dia por vez)</h2>
    {% if start_date and end_date %}
      <p class="muted">Período: <span class="mono">{{ start_date }}</span> até <span class="mono">{{ end_date }}</span></p>
    {% endif %}

    <div class="row">
      <button id="btnStart">Iniciar</button>
      <button id="btnPause" disabled>Pausar</button>
      <div id="status" class="mono">Aguardando…</div>
    </div>

    <div style="margin-top: 10px;">
      <progress id="bar" value="0" max="100"></progress>
      <div class="muted" style="margin-top:6px;">
        <span id="counter">0</span> de <span id="total">{{ total_days or 0 }}</span> dias
      </div>
    </div>

    <div id="error" class="err" style="margin-top: 12px; display:none;"></div>
  </div>

  <script>
    (function () {
      const jobId = "{{ job_id }}";
      const statusEl = document.getElementById("status");
      const barEl = document.getElementById("bar");
      const counterEl = document.getElementById("counter");
      const totalEl = document.getElementById("total");
      const errEl = document.getElementById("error");

      const btnStart = document.getElementById("btnStart");
      const btnPause = document.getElementById("btnPause");

      let running = false;
      let paused = false;

      async function stepOnce() {
        const resp = await fetch(`/admin/dds-reports/job/${encodeURIComponent(jobId)}/step`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}"
        });
        const data = await resp.json().catch(() => ({}));

        if (!data || data.ok === false) {
          const msg = (data && (data.error || (data.data && data.data.error))) || `Erro HTTP ${resp.status}`;
          throw new Error(msg);
        }
        return data;
      }

      function renderProgress(st) {
        const d = st && (st.data || st) || {};
        const processed = Number(d.processed || 0);
        const total = Number(d.total || Number(totalEl.textContent) || 0);
        const percent = Number(d.percent || (total ? Math.floor((processed/total)*100) : 0));

        const day = d.day || "";
        const msg = d.message || "Processando...";
        if (day) {
          statusEl.textContent = `Gerando o relatório para o dia ${day} — ${processed} de ${total} dias (${percent}%)`;
        } else {
          statusEl.textContent = `${msg} — ${processed} de ${total} dias (${percent}%)`;
        }

        counterEl.textContent = String(processed);
        totalEl.textContent = String(total);
        barEl.value = Math.max(0, Math.min(100, percent));
      }

      async function loop() {
        if (!running) return;
        if (paused) return;

        try {
          const st = await stepOnce();
          if (st.status === "done") {
            renderProgress(st.data);
            statusEl.textContent = "Concluído. Abrindo relatório…";
            running = false;
            btnPause.disabled = true;
            btnStart.disabled = false;
            window.location.href = st.show_url;
            return;
          }
          renderProgress(st);
        } catch (e) {
          errEl.textContent = e && e.message ? e.message : "Erro ao gerar relatório.";
          errEl.style.display = "block";
          running = false;
          btnPause.disabled = true;
          btnStart.disabled = false;
          return;
        }

        // pequeno delay entre etapas
        setTimeout(loop, 250);
      }

      btnStart.addEventListener("click", () => {
        errEl.style.display = "none";
        running = true;
        paused = false;
        btnStart.disabled = true;
        btnPause.disabled = false;
        btnPause.textContent = "Pausar";
        loop();
      });

      btnPause.addEventListener("click", () => {
        paused = !paused;
        btnPause.textContent = paused ? "Continuar" : "Pausar";
        if (!paused) loop();
      });

    })();
  </script>
</body>
</html>
