<!--
============================================================
FILE: templates/status.html
FUNCTION: Minimal status page (optional) showing last payload posted to /update_status.
============================================================
-->
{% extends "base.html" %}
{% block content %}
  <div class="row row-space-between">
    <div>
      <h2>Status do Serviço</h2>
      <div class="muted">Atualizado em: {{ payload.updated_at or "-" }}</div>
    </div>
    <div class="actions">
      <a class="btn" href="{{ url_for('admin.dashboard') }}">Painel DDS ONLINE</a>
    </div>
  </div>

  <div class="card">
    <pre class="code">{{ payload.data | tojson(indent=2) }}</pre>
  </div>
{% endblock %}
