# Configurações de Ambiente para o Cloud Run
# Use com: gcloud run deploy --env-vars-file env.yaml

# Infraestrutura / Gunicorn
GUNICORN_CMD_ARGS: "--bind :8080 --timeout 900 --graceful-timeout 30 --worker-class gthread --threads 8 --workers 1"

# Firebase Storage / GCS
DDS_BUCKET_NAME: "dds-treinamentos.firebasestorage.app"
DDS_BASE_PREFIX: "DDSv2"
DDS_REPORTS_BUCKET_NAME: "dds-treinamentos.firebasestorage.app"

# Assinatura de URLs (IAM)
# Caso não configurada, o sistema tentará auto-detectar
SIGNING_SERVICE_ACCOUNT: "dds-admin-sa@dds-treinamentos.iam.gserviceaccount.com"

# Segurança e Login
#ADMIN_PASSWORD: "DdsAdmin2024!"
#APP_SECRET_KEY: "uma_chave_muito_secreta_e_aleatoria"

# Regionalização
DDS_TIMEZONE: "America/Sao_Paulo"
