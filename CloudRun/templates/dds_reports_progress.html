<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gerando Relatório...</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    .card { max-width: 900px; padding: 18px; border: 1px solid #ddd; border-radius: 10px; }
    .muted { color: #666; }
    progress { width: 100%; height: 18px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .err { color: #b00020; font-weight: 700; }
    pre { background:#111; color:#eee; padding:12px; border-radius:8px; overflow:auto; max-height: 320px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Gerando relatório</h2>
    <p class="muted">
      Período: <span class="mono">{{ start_date }}</span> até <span class="mono">{{ end_date }}</span>
      {% if force %} • <b>FORÇAR</b>{% endif %}
    </p>

    <div id="status" class="mono">Inicializando...</div>

    <div style="margin-top: 10px;">
      <progress id="bar" value="0" max="100"></progress>
      <div class="muted" style="margin-top:6px;">
        <span id="counter">0</span> de <span id="total">{{ total_days }}</span> dias
      </div>
    </div>

    <h4 style="margin-top:14px;">Log</h4>
    <pre id="log"></pre>

    <div id="error" class="err" style="margin-top: 12px; display:none;"></div>

    <div title="{{ app_revision }}"
         style="margin-top:16px; text-align:right; font-size:11px; color:#777; opacity:.75;">
      v{{ app_revision_short }}
    </div>
  </div>

  <script>
    (function () {
      const statusEl = document.getElementById("status");
      const barEl = document.getElementById("bar");
      const counterEl = document.getElementById("counter");
      const totalEl = document.getElementById("total");
      const errEl = document.getElementById("error");
      const logEl = document.getElementById("log");

      function log(line) {
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      const params = new URLSearchParams({
        start_date: "{{ start_date }}",
        end_date: "{{ end_date }}",
        type: "{{ rtype }}",
        force: "{{ '1' if force else '0' }}"
      });

      const es = new EventSource("/admin/dds-reports/generate/stream?" + params.toString());

      es.addEventListener("progress", (e) => {
        const p = JSON.parse(e.data || "{}");
        const processed = Number(p.processed || 0);
        const total = Number(p.total || Number(totalEl.textContent) || 0);
        const percent = Number(p.percent || 0);

        const msg = p.day
          ? `Gerando o relatório para o dia ${p.day} — ${processed} de ${total} dias (${percent}%)`
          : `${p.message || "Processando..."} — ${processed} de ${total} dias (${percent}%)`;

        statusEl.textContent = msg;
        counterEl.textContent = String(processed);
        totalEl.textContent = String(total);
        barEl.value = Math.max(0, Math.min(100, percent));
        log(msg);
      });

      es.addEventListener("done", (e) => {
        const d = JSON.parse(e.data || "{}");
        log("Concluído. Abrindo relatório…");
        es.close();
        window.location.href = d.show_url || ("/admin/dds-reports/show/" + encodeURIComponent(d.key || ""));
      });

      es.addEventListener("error", (e) => {
        let msg = "Falha ao gerar relatório. Verifique os logs do Cloud Run.";
        try {
          const data = e.data ? JSON.parse(e.data) : null;
          if (data && data.message) msg = data.message;
        } catch {}
        errEl.textContent = msg;
        errEl.style.display = "block";
        log("ERRO: " + msg);
        es.close();
      });
    })();
  </script>
</body>
</html>
